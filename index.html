<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMINE SECURITY | Professional Protection</title>
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Changa:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background: black; overflow-x: hidden; font-family: 'Cairo', sans-serif; color: white; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        .main-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; justify-content: center; }
        .panel { background: rgba(0, 0, 0, 0.9); border: 2px solid gold; border-radius: 20px; padding: 30px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); width: 320px; text-align: center; backdrop-filter: blur(5px); }
        h1 { font-family: 'Changa', sans-serif; color: gold; text-shadow: 0 0 15px gold; margin: 0; font-size: 2rem; }
        .status-bar { border: 1px solid #0f0; color: #0f0; padding: 5px; font-family: monospace; font-size: 0.7rem; margin-bottom: 20px; border-radius: 5px; }
        .services { width: 100%; text-align: right; margin: 20px 0; border-collapse: collapse; }
        .services td { padding: 12px 5px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .services td.price { color: gold; font-weight: bold; text-align: left; }
        .money-btn { background: linear-gradient(45deg, #ffd700, #b8860b); color: black; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; font-size: 1rem; transition: 0.4s; font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="main-content">
        <div class="panel">
            <div class="status-bar">PROTECTION: ACTIVE | ENCRYPTION: AES-256</div>
            <h1>AMINE SECURITY 🛡️</h1>
            <p style="font-size: 0.8rem; color: #bbb; margin: 15px 0;">نحن لا نعد بالحماية، نحن نفرضها.</p>
            <table class="services">
                <tr><td>تأمين الحسابات</td><td class="price">199 DH</td></tr>
                <tr><td>اختبار الاختراق</td><td class="price">499 DH</td></tr>
                <tr><td>تنظيف الأجهزة</td><td class="price">250 DH</td></tr>
            </table>
            <div id="counter" style="color: #0f0; font-family: monospace; margin-bottom: 15px; font-size: 0.8rem;">العمليات المنجزة: 1452</div>
            <button class="money-btn" onclick="window.location.href='https://wa.me/2126XXXXXXXX'">ابدأ التأمين الآن</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "01011001";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);
        let count = 1452;
        setInterval(() => {
            count += Math.floor(Math.random() * 2);
            document.getElementById('counter').innerText = "العمليات المنجزة: " + count;
        }, 3000);
    </script>
</body>
</html>
